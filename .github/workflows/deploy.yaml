name : Check If Code Build

on:
  push:
    branches:
      - main

permissions: 
  contents: read
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Codebase
        uses: actions/checkout@v6

      - name: Check If File Exist
        run: |
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-versiom: "24"

      - name: Install dependencies
        run: npm install

      - name: Build Codebase
        run: npm run build
      
      - name: HealthCheck
        run: echo "Health Check Passed"

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with: 
          path: ./out

  deploy: 
    environment:
      name: github-pages
      url: ${{ steps..deploy.outputs.page_url}}
      runs-on: ubuntu-latest
      needs: check
      steps:
        - name: Deploy To Github pages
          id: deployment
          uses: actions/deploy-pages@v4