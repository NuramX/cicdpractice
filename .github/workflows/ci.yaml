name : Check If Code Build

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Codebase
        uses: actions/checkout@v6

      - name: Check If File Exist
        run: |
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-versiom: "24"

      - name: Install dependencies
        run: npm install

      - name: Build Codebase
        run: npm run build